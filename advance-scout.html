<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VT Advance Scout — Defense</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --m:#861F41;--m-dark:#3D0A1E;--o:#E5751F;--bg:#1B1B2F;--card:#242438;--txt:#FFFFFF;--muted:#AAA8C2;
  --bdr:#3A3A58;--good:#2E9E4F;--goodbg:rgba(46,158,79,.18);--warn:#E8A33D;--warnbg:rgba(232,163,61,.18);
  --bad:#E5484D;--badbg:rgba(229,72,77,.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh;font-size:14px}
/* SIDEBAR */
#sb{width:210px;min-width:210px;background:linear-gradient(180deg,var(--m-dark) 0%,var(--m) 100%);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sb-logo{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px}
.sb-logo-badge{background:var(--o);color:var(--m-dark);font-size:15px;font-weight:900;width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.sb-team{color:#fff;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.sb-sub{color:rgba(255,255,255,.5);font-size:10px;margin-top:1px}
.year-sel{margin:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:6px 8px;width:calc(100% - 28px)}
.year-sel option{color:#1a1a1a}
.no-data-state{text-align:center;padding:70px 24px}
.no-data-state h2{font-size:16px;font-weight:800;color:var(--muted);margin-bottom:8px}
.no-data-state p{font-size:12.5px;color:var(--muted);line-height:1.8;max-width:480px;margin:0 auto}
.no-data-state .nd-icon{font-size:40px;margin-bottom:14px}
.no-data-cta{margin-top:18px;display:inline-block;background:var(--m);color:#fff;padding:9px 20px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.team-content{display:none}
.team-content.on{display:block}
.sb-sec{padding:12px 14px 3px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.nav{display:block;padding:9px 14px;color:rgba(255,255,255,.75);text-decoration:none;font-size:12.5px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.nav:hover{background:rgba(255,255,255,.07);color:#fff}
.nav.on{background:rgba(232,119,34,.2);color:var(--o);border-left-color:var(--o);font-weight:700}
.nav.sub{padding-left:26px;font-size:12px}
/* MAIN */
#main{margin-left:210px;flex:1;display:flex;flex-direction:column;min-height:100vh}
/* TOP BAR */
#tbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.tbar-opp{flex:1}
.tbar-name{font-size:20px;font-weight:900;color:var(--m);line-height:1}
.tbar-info{font-size:11px;color:var(--muted);margin-top:2px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all .12s;letter-spacing:.3px}
.btn-m{background:var(--m);color:#fff}.btn-m:hover{background:#5c1221}
.btn-o{background:var(--o);color:#fff}.btn-o:hover{background:#cc6b1d}
.btn-out{background:transparent;color:var(--m);border:2px solid var(--m)}.btn-out:hover{background:var(--m);color:#fff}
/* CONTENT */
#content{padding:20px 22px;flex:1}
#content.drag-over{outline:3px dashed var(--o);outline-offset:-8px;background:rgba(232,119,34,.05)}
/* SECTIONS */
.sec{display:none}.sec.on{display:block}
/* CARD */
.card{background:var(--card);border-radius:10px;padding:18px;border:1px solid var(--bdr)}
.card-hd{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:10px}
/* SECTION HEADER */
.sec-hd{margin-bottom:18px}
.sec-title{font-size:18px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:.5px}
.sec-line{height:3px;background:linear-gradient(90deg,var(--m),var(--o));margin:4px 0 14px;border-radius:2px;width:60px}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
/* STAT CARDS */
.scard{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--bdr);border-left:4px solid var(--bdr)}
.scard.good{border-left-color:var(--good)}.scard.bad{border-left-color:var(--bad)}.scard.warn{border-left-color:var(--warn)}
.sl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:20px;font-weight:900;margin:3px 0}
.sr{display:flex;gap:6px;flex-wrap:wrap}
.rb{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.rb.c{background:rgba(255,255,255,.08);color:var(--muted)}
.rb.ng{background:var(--goodbg);color:var(--good)}.rb.nb{background:var(--badbg);color:var(--bad)}.rb.nw{background:var(--warnbg);color:var(--warn)}
/* FAST FACTS */
.ff{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--bdr)}
.ff:last-child{border-bottom:none}
.ff-dot{width:22px;height:22px;border-radius:50%;background:var(--m);color:var(--o);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;margin-top:1px}
.ff-text{font-size:12.5px;line-height:1.55}
.hl{color:var(--o);font-weight:700}.hlg{color:var(--good);font-weight:700}.hlb{color:var(--bad);font-weight:700}
/* EXPLOIT */
.exploit{background:linear-gradient(135deg,#0f2d0f,#1a4a1a);color:#fff;border-radius:10px;padding:18px}
.exploit-hd{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#86efac;margin-bottom:12px}
.ex-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.ex-item:last-child{border-bottom:none}
.ex-arr{color:#86efac;font-weight:900;font-size:14px;flex-shrink:0}
.ex-txt{font-size:12.5px;line-height:1.4}
.ex-txt strong{color:#fde68a}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:var(--m);color:#fff;padding:8px 11px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--bdr)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.025)}
.tbl tr:hover td{background:rgba(255,255,255,.05)}
.tbl td.b{font-weight:700}.tbl td.c{text-align:center}.tbl td.r{text-align:right}
/* SUB TABS */
.stabs{display:flex;gap:0;margin-bottom:18px;border-bottom:2px solid var(--bdr)}
.stab{padding:9px 18px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .1s}
.stab:hover{color:var(--m)}.stab.on{color:var(--m);border-bottom-color:var(--o);font-weight:800}
.stcon{display:none}.stcon.on{display:block}
/* PRESSURE CARDS */
.pcard{background:var(--card);border-radius:10px;padding:16px;text-align:center;border:1px solid var(--bdr)}
.ppct{font-size:32px;font-weight:900;line-height:1}
.plbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:4px}
.pcnt{font-size:11px;color:var(--muted);margin-top:2px}
.pcard.int .ppct{color:var(--bad)}.pcard.fld .ppct{color:var(--m)}.pcard.bnd .ppct{color:var(--warn)}.pcard.dbl .ppct{color:var(--o)}
/* ZONE CARDS */
.zcard{border-radius:10px;padding:18px;border:1px solid var(--bdr)}
.zcard.outer{background:rgba(229,117,31,.12);border:2px solid var(--o)}
.zcard.inner{background:rgba(220,38,38,.12);border:2px solid #dc2626}
.zcard.score{background:rgba(127,29,29,.18);border:2px solid #7f1d1d}
.zcard.gl{background:var(--m);color:#fff}
.zhd{font-size:13px;font-weight:900;text-transform:uppercase;margin-bottom:10px}
.zcard.outer .zhd{color:var(--m)}.zcard.inner .zhd{color:#dc2626}.zcard.score .zhd{color:#7f1d1d}.zcard.gl .zhd{color:var(--o)}
/* DEPTH CHART */
.dc-row{display:flex;gap:10px;margin-bottom:14px}
.dc-pos{flex:1;min-width:0}
.dc-lbl{background:var(--m);color:#fff;font-size:10px;font-weight:800;text-align:center;padding:4px;border-radius:4px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.dc-player{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:6px;padding:7px 8px;margin-bottom:5px;font-size:11px;line-height:1.3}
.dc-player.s{border-left:3px solid var(--o)}
.dc-num{font-weight:900;color:var(--m);font-size:12px}
.dc-name{font-weight:700}
.dc-info{color:var(--muted);font-size:10px}
/* DC PROFILE HEADSHOT */
.dc-photo{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid var(--m);flex-shrink:0;display:block;background:var(--bdr)}
.dc-photo-placeholder{width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.06);border:3px dashed var(--bdr);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--muted);flex-shrink:0}
/* CAREER TIMELINE */
.ct-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr);align-items:center;font-size:12.5px}
.ct-yr{min-width:80px;font-weight:800;color:var(--m)}
.ct-school{font-weight:600;flex:1}
.ct-role{color:var(--muted);font-size:11px}
.badge{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:800;text-transform:uppercase}
.badge.nfl{background:#1e3a8a;color:#fff}.badge.col{background:var(--m);color:#fff}
/* RUN EFF BARS */
.ebar{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.ebar-lbl{min-width:90px;font-size:12px;font-weight:700}
.ebar-track{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:18px;overflow:hidden}
.ebar-fill{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;border-radius:4px}
.ebar-fill span{font-size:10px;font-weight:800;color:#fff}
.ebar-ct{min-width:55px;text-align:right;font-size:11px;color:var(--muted)}
/* CALLOUT */
.callout{padding:11px 14px;border-radius:8px;font-size:12.5px;line-height:1.5;margin-bottom:14px}
.callout.info{background:rgba(59,130,246,.15);border-left:4px solid #3b82f6}
.callout.warn{background:var(--warnbg);border-left:4px solid var(--o)}
.callout.danger{background:var(--badbg);border-left:4px solid var(--bad)}
.callout.success{background:var(--goodbg);border-left:4px solid var(--good)}
/* CHART */
.ch{position:relative;height:220px}
.ch-lg{position:relative;height:300px}
.ch-sm{position:relative;height:160px}
/* UTIL */
.mt8{margin-top:8px}.mt14{margin-top:14px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb14{margin-bottom:14px}
.flex{display:flex}.gap10{gap:10px}.gap14{gap:14px}
.txt-sm{font-size:11.5px}.txt-xs{font-size:11px}.txt-muted{color:var(--muted)}
.fw7{font-weight:700}.fw9{font-weight:900}
/* SAVED REPORTS SIDEBAR */
.sb-save-btn{display:block;margin:10px 12px 4px;padding:8px 12px;background:rgba(232,119,34,.25);color:var(--o);font-size:12px;font-weight:800;border:1px solid rgba(232,119,34,.4);border-radius:6px;cursor:pointer;text-align:center;transition:all .12s;letter-spacing:.3px}
.sb-save-btn:hover{background:rgba(232,119,34,.4);color:#fff}
.saved-report-item{display:flex;align-items:center;gap:6px;padding:8px 14px 8px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.saved-report-item:hover{background:rgba(255,255,255,.07);border-left-color:rgba(255,255,255,.25)}
.saved-report-item.active-report{background:rgba(232,119,34,.15);border-left-color:var(--o)}
.sr-icon{font-size:13px;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-date{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px}
.sr-del{color:rgba(255,255,255,.25);font-size:18px;font-weight:900;line-height:1;cursor:pointer;flex-shrink:0;padding:0 3px;transition:color .1s}
.sr-del:hover{color:#ff6b6b}
.sr-empty{padding:8px 14px;font-size:11px;color:rgba(255,255,255,.3);font-style:italic}
/* SHARE MODAL */
.share-option{display:flex;align-items:center;gap:14px;padding:14px;border:2px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all .12s;margin-bottom:10px}
.share-option:hover{border-color:var(--m);background:#f9f9f9}
.share-icon{font-size:28px;flex-shrink:0}
.share-title{font-size:14px;font-weight:800;color:var(--m)}
.share-desc{font-size:12px;color:var(--muted);margin-top:2px}
/* ACTIVE REPORT BADGE in top bar */
.active-badge{background:var(--goodbg);color:var(--good);font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
/* FILE DROP */
.fdrop{border:2px dashed var(--bdr);border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:#fafafa;transition:all .12s}
.fdrop:hover,.fdrop.drag{border-color:var(--o);background:#fff8f3}
.fdrop input{display:none}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
#modal.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:520px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:17px;font-weight:900;color:var(--m);margin-bottom:6px}
.modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:18px}
/* PRINT LABEL (hidden on screen, shown in print) */
.print-label{display:none;font-size:13px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--o)}
/* PRINT */
@page{margin:.5in .4in .5in .4in;size:letter portrait}

/* ================= MOBILE / RESPONSIVE ================= */
#sbToggle{display:none;position:fixed;top:12px;left:14px;z-index:300;background:var(--o);color:var(--m-dark);border:none;width:38px;height:38px;border-radius:8px;font-size:18px;font-weight:900;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.4);}
#sbOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;}
#sbOverlay.show{display:block;}
@media screen and (max-width:900px){
  #sbToggle{display:flex;}
  #sb{transform:translateX(-100%);transition:transform .22s ease;width:270px;min-width:270px;box-shadow:4px 0 24px rgba(0,0,0,.5);}
  #sb.open{transform:translateX(0);}
  #main{margin-left:0;}
  #tbar{padding-left:58px;flex-wrap:wrap;row-gap:8px;}
  #drop-hint{display:none;}
  .g2,.g3{grid-template-columns:1fr!important;}
  .g4{grid-template-columns:repeat(2,1fr)!important;}
  .g7{grid-template-columns:repeat(4,1fr)!important;gap:8px!important;}
  .stabs{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .stab{white-space:nowrap;flex-shrink:0;padding:9px 14px;}
  .dc-row{flex-wrap:wrap;}
  .dc-pos{flex:1 1 45%;min-width:130px;}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl{white-space:nowrap;}
}
@media screen and (max-width:560px){
  .g4,.g7{grid-template-columns:repeat(2,1fr)!important;}
  .dc-pos{flex:1 1 100%;}
  #content{padding:14px 12px;}
  .sec-title{font-size:15px;}
  .sv{font-size:17px;}
  .card{padding:12px;}
}

/* ── PRINT LAYOUT (class-based, applied by JS before charts rebuild) ──
   Mirrors the print media query's layout-affecting rules but as a plain
   class so it takes effect BEFORE window.print() -- Chart.js needs the
   final container size at chart-creation time, not just at paint time. */
body.printing #sb,body.printing #modal,body.printing #sbToggle,body.printing #sbOverlay{display:none!important}
body.printing #main{margin-left:0!important;width:720px!important;max-width:720px!important}
body.printing #tbar{position:static!important;box-shadow:none!important}
body.printing #tbar button,body.printing #tbar .btn,body.printing #drop-hint{display:none!important}
body.printing .g7{grid-template-columns:repeat(4,1fr)!important;gap:8px!important}
body.printing .g4{grid-template-columns:repeat(2,1fr)!important}
body.printing .g3{grid-template-columns:1fr 1fr 1fr!important}
body.printing .g2{grid-template-columns:1fr 1fr!important}
body.printing .ch{height:160px!important}
body.printing .ch-lg{height:190px!important}
body.printing .ch-sm{height:95px!important}

.donut-legend{display:grid;grid-template-columns:repeat(4,1fr);gap:3px 6px;margin-top:6px;}
.donut-legend-item{display:flex;align-items:center;gap:4px;min-width:0;}
.donut-legend-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.donut-legend-label{font-size:8.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  /* Base theme is dark-on-navy for the screen. Redefining the theme
     variables here (rather than patching every dark surface one by one)
     flips body text, #tbar, and every .card/.scard/.pcard to a light
     background with dark text automatically, since they all read from
     these custom properties. This is what was missing before -- the old
     print block only set body{background:#fff}, never body{color:...},
     so text stayed white-on-white/white-on-dark almost everywhere. */
  :root{--bg:#ffffff;--card:#ffffff;--txt:#111111;--muted:#555555;--bdr:#cccccc;}
  body{background:#fff!important;font-size:11.5px!important;display:block!important}
  #sb,#modal,#sbToggle,#sbOverlay{display:none!important}
  #main{margin-left:0!important;display:block!important}
  #tbar{position:static!important;box-shadow:none!important;border-bottom:2px solid var(--m)!important;padding:8px 16px!important;background:#fff!important}
  #tbar button,#tbar .btn,#drop-hint{display:none!important}
  .tbar-name{font-size:18px!important}
  /* Hardcoded translucent-white overlays (designed as "light wash on a
     dark card") disappear on a white card -- give them a visible light
     gray fill instead so boxes/tracks/pills stay legible. */
  .dc-player{background:#f5f5f5!important}
  .dc-photo-placeholder{background:#f0f0f0!important}
  .ebar-track{background:#e5e5e5!important}
  .rb.c{background:#eeeeee!important}
  /* SECTIONS: every team now has the exact same 9-section shell (Overview/DC/Stats/Depth/
     Run/ND/CD/RZ/GL), populated with either that team's real report or the shared blank
     placeholder content -- so printing is uniform for every team, no special-casing needed. */
  .sec{display:none!important}
  #sec-overview,#sec-dc,#sec-stats,#sec-depth,
  #sec-run,#sec-nd,#sec-cd,#sec-rz,#sec-gl{display:block!important;page-break-before:always;break-before:page;page-break-inside:avoid;break-inside:avoid}
  #sec-overview{page-break-before:avoid;break-before:avoid}
  .sec-hd{page-break-after:avoid;break-after:avoid}
  /* SUB-TABS: hide tab buttons, show all content */
  .stabs{display:none!important}
  .stcon{display:block!important}
  /* Each sub-tab group also starts fresh — no bleeding between them */
  .stcon+.stcon{border-top:2px solid var(--bdr)!important;margin-top:16px!important;padding-top:14px!important;page-break-before:always;break-before:page}
  .print-label{display:block!important}
  /* CARDS — never break mid-card */
  .card,.scard{box-shadow:none!important;border:1px solid #d1d5db!important;break-inside:avoid;page-break-inside:avoid}
  .zcard{box-shadow:none!important;break-inside:avoid}
  /* Grids don't break mid-row */
  .g2,.g3,.g4,.g7{break-inside:avoid;page-break-inside:avoid}
  /* Tables don't break mid-row */
  .tbl tr{break-inside:avoid;page-break-inside:avoid}
  .exploit{background:#0f2d0f!important;color:#fff!important;break-inside:avoid}
  .exploit *{color:inherit}
  .exploit .exploit-hd{color:#86efac!important}
  .exploit .ex-arr{color:#86efac!important}
  .zcard.gl{background:var(--m)!important;color:#fff!important}
  .zcard.gl *{color:#fff}
  .zcard.gl .zhd{color:var(--o)!important}
  /* TABLE COLORS PRESERVED */
  .tbl th{background:var(--m)!important;color:#fff!important;-webkit-print-color-adjust:exact!important}
  .tbl tr:nth-child(even) td{background:#f9fafb!important}
  .zcard.gl .tbl tr:nth-child(even) td{background:transparent!important}
  .tbl{break-inside:avoid;font-size:11px!important}
  /* PCARD COLORS */
  .pcard.int .ppct{color:var(--bad)!important}
  .pcard.fld .ppct{color:var(--m)!important}
  .pcard.bnd .ppct{color:var(--warn)!important}
  .pcard.dbl .ppct{color:var(--o)!important}
  /* RANK BADGES */
  .rb.ng{background:var(--goodbg)!important;color:var(--good)!important}
  .rb.nb{background:var(--badbg)!important;color:var(--bad)!important}
  .rb.nw{background:var(--warnbg)!important;color:var(--warn)!important}

  .callout{border-left:4px solid currentColor!important}
  .callout.danger{background:var(--badbg)!important;border-color:var(--bad)!important}
  .callout.warn{background:var(--warnbg)!important;border-color:var(--o)!important}
  .callout.info{background:#eff6ff!important;border-color:#3b82f6!important}
  .callout.success{background:var(--goodbg)!important;border-color:var(--good)!important}
  /* STAT BORDER COLORS */
  .scard.good{border-left:4px solid var(--good)!important}
  .scard.bad{border-left:4px solid var(--bad)!important}
  .scard.warn{border-left:4px solid var(--warn)!important}
  /* GRID REFLOW FOR LETTER PAPER */
  .g7{grid-template-columns:repeat(4,1fr)!important;gap:8px!important}
  .g4{grid-template-columns:repeat(2,1fr)!important}
  .g3{grid-template-columns:1fr 1fr 1fr!important}
  .g2{grid-template-columns:1fr 1fr!important}
  /* CHART HEIGHTS */
  .ch{height:160px!important}
  .ch-lg{height:190px!important}
  .ch-sm{height:95px!important}
  /* MARGINS */
  .mt20{margin-top:12px!important}
  .mt14{margin-top:10px!important}
  .mb14{margin-bottom:10px!important}
  /* DC CAREER */
  .ct-item{font-size:11px!important;padding:5px 0!important}
  /* DEPTH CHART */
  .dc-row{flex-wrap:wrap!important}
  .dc-player{font-size:10px!important;padding:5px!important}
  /* EFF BARS */
  .ebar-fill span{font-size:9px!important}

  /* Fit Overview and the Blitz sub-tabs on a single printed page each */
  #sec-overview .card,#sec-overview .exploit{padding:10px 12px!important}
  #sec-overview .card-hd,#sec-overview .exploit-hd{margin-bottom:6px!important}
  #sec-overview .g7{gap:6px!important}
  #sec-overview .g2,#sec-overview .g4{gap:8px!important}
  #sec-overview .mb14{margin-bottom:8px!important}
  #sec-overview .mt14{margin-top:8px!important}
  #sec-overview .sv{font-size:16px!important}
  #sec-overview .ff{padding:5px 0!important}
  #sec-overview .ex-item{padding:4px 0!important}
  #nd-blitz .card,#cd-blitz .card{padding:8px 10px!important}
  #nd-blitz .card-hd,#cd-blitz .card-hd{margin-bottom:4px!important;font-size:9px!important}
  #nd-blitz .g4,#cd-blitz .g4{gap:6px!important}
  #nd-blitz .g2,#cd-blitz .g2{gap:8px!important}
  #nd-blitz .pcard,#cd-blitz .pcard{padding:8px!important}

  #nd-blitz .plbl,#cd-blitz .plbl{font-size:9px!important}
  #nd-blitz .tbl,#cd-blitz .tbl{font-size:9px!important}
  #nd-blitz .tbl th,#cd-blitz .tbl th{padding:4px 6px!important}
  #nd-blitz .tbl td,#cd-blitz .tbl td{padding:3px 6px!important}
  #nd-blitz .mb14,#cd-blitz .mb14{margin-bottom:6px!important}
  /* ZONE CARDS */
  .zcard.outer{background:#fff7ed!important;border:2px solid var(--o)!important}
  .zcard.inner,.zcard.score{background:#fef2f2!important;border:2px solid #dc2626!important}
}

      });
  }

  function decryptPayload(password) {
    var payload = JSON.parse(document.getElementById('vtLockPayload').textContent);
    var salt = b64ToBytes(payload.salt);
    var iv = b64ToBytes(payload.iv);
    var ct = b64ToBytes(payload.ct);
    return deriveKey(password, salt).then(function(key){
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    }).then(function(plainBuf){
      return new TextDecoder().decode(plainBuf);
    });
  }

  function reveal(html) {
    document.body.innerHTML = html;
    var scripts = Array.prototype.slice.call(document.body.querySelectorAll('script'));
    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');
      for (var i = 0; i < oldScript.attributes.length; i++) {
        var attr = oldScript.attributes[i];
        newScript.setAttribute(attr.name, attr.value);
      }
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function attemptUnlock(password, opts) {
    opts = opts || {};
    return decryptPayload(password).then(function(html){
      try { sessionStorage.setItem(SS_KEY, password); } catch(e) {}
      reveal(html);
      return true;
    }).catch(function(){
      if (!opts.silent) {
        var err = document.getElementById('vtLockErr');
        if (err) err.textContent = 'Incorrect password. Try again.';
        var input = document.getElementById('vtLockInput');
        if (input) { input.value = ''; input.focus(); }
      }
      return false;
    });
  }

  function wireUpUI() {
    var btn = document.getElementById('vtLockBtn');
    var input = document.getElementById('vtLockInput');
    if (btn) btn.addEventListener('click', function(){ attemptUnlock(input.value); });
    if (input) input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') attemptUnlock(input.value);
    });
  }

  var stored = null;
  try { stored = sessionStorage.getItem(SS_KEY); } catch(e) {}
  if (stored) {
    attemptUnlock(stored, { silent: true }).then(function(ok){
      if (!ok) wireUpUI();
    });
  } else {
    wireUpUI();
  }
})();
</script>
</body></html>

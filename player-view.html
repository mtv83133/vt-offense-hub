<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VT Scouting Report — Player View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --m:#861F41;--m-dark:#3D0A1E;--o:#E5751F;--bg:#1B1B2F;--card:#242438;--txt:#FFFFFF;--muted:#AAA8C2;
  --bdr:#3A3A58;--good:#2E9E4F;--goodbg:rgba(46,158,79,.18);--warn:#E8A33D;--warnbg:rgba(232,163,61,.18);
  --bad:#E5484D;--badbg:rgba(229,72,77,.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;padding-bottom:40px}
#topbar{background:linear-gradient(135deg,var(--m-dark) 0%,var(--m) 100%);padding:16px 16px 14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.tb-title{display:flex;align-items:center;gap:12px}
.tb-logo{width:38px;height:38px;border-radius:8px;background:var(--o);color:var(--m-dark);font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-h1{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.tb-h2{font-size:12.5px;color:rgba(255,255,255,.75);margin-top:1px}
.team-tabs,.pos-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.team-tabs::-webkit-scrollbar,.pos-tabs::-webkit-scrollbar{display:none}
.team-tabs{background:var(--m-dark);border-bottom:1px solid rgba(255,255,255,.08)}
.pos-tabs{background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:78px;z-index:49}
.tt-btn,.pt-btn{flex:0 0 auto;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid transparent;border-radius:20px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.tt-btn.on{background:var(--o);color:var(--m-dark)}
.pt-btn.on{background:var(--m);color:#fff;border-color:var(--m)}
#content{padding:14px 12px 8px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:12px}
.card-hd{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.psec{display:none}
.psec.on{display:block}
/* Keys tab */
.wk-notes{font-size:13px;line-height:1.55;color:var(--txt)}
.wk-notes p{margin-bottom:10px}
.wk-notes p:last-child{margin-bottom:0}
.exploit-item{background:rgba(46,158,79,.1);border-left:3px solid var(--good);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.45}
.exploit-item:last-child{margin-bottom:0}
.exploit-item strong{color:#86efac}
.fact-item{border-left:3px solid var(--o);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.45;background:rgba(229,117,31,.08)}
.fact-item:last-child{margin-bottom:0}
.fact-item .hlb{color:#f4a462;font-weight:700}
.fact-item .hl{color:#fff;font-weight:700}
.sitref-grid{display:grid;grid-template-columns:1fr;gap:10px}
.sitref-card{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:8px;padding:11px 12px}
.sitref-sit{font-size:12.5px;font-weight:800;color:var(--o);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.sitref-line{font-size:12.5px;padding:3px 0;color:var(--txt)}
/* Depth chart (reused pattern) */
.dc-row{display:flex;flex-direction:column;gap:6px}
.dc-pos-wrap{margin-bottom:10px}
.dc-lbl{background:var(--m);color:#fff;font-size:10px;font-weight:800;text-align:center;padding:4px;border-radius:4px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.dc-player{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:6px;padding:8px 9px;margin-bottom:5px;font-size:12px;line-height:1.35}
.dc-player.s{border-left:3px solid var(--o)}
.dc-num{font-weight:900;color:var(--o);font-size:13px}
.dc-name{font-weight:700}
.dc-info{color:var(--muted);font-size:11px}
.dc-links{display:flex;gap:6px;margin-top:6px}
.dc-link{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:4px 8px;border-radius:4px;text-decoration:none;border:1px solid var(--bdr);color:var(--txt);background:rgba(255,255,255,.03)}
.dc-link.pff{border-color:var(--o);color:var(--o)}
.dc-pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:480px){.dc-pos-grid{grid-template-columns:1fr}}
/* Donuts */
.donut-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:480px){.donut-row{grid-template-columns:1fr}}
.donut-wrap{text-align:center}
.donut-cap{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.ch-donut{height:190px;position:relative}
/* Bars */
.ebar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ebar-lbl{min-width:96px;font-size:11.5px;font-weight:700;flex-shrink:0}
.ebar-track{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:18px;overflow:hidden}
.ebar-fill{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;border-radius:4px}
.ebar-fill span{font-size:10px;font-weight:800;color:#fff}
.bar-section-lbl{font-size:11px;font-weight:800;color:var(--o);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px}
.bar-section-lbl:first-child{margin-top:0}
.empty-note{color:var(--muted);font-size:12.5px;text-align:center;padding:16px 0}
</style>
<style>
/* ===== Password gate (injected by lock_page.js) ===== */
#vtLockOverlay{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#3D0A1E 0%,#1B1B2F 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;}
#vtLockBox{background:#242438;border:1px solid #3A3A58;border-radius:16px;padding:40px 32px;max-width:380px;width:100%;
  box-shadow:0 12px 48px rgba(0,0,0,.6);text-align:center;}
#vtLockBox .vt-lock-icon{background:#E5751F;color:#3D0A1E;font-size:24px;font-weight:900;width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;border-radius:10px;margin:0 auto 18px;}
#vtLockBox h2{color:#fff;font-size:16px;font-weight:800;letter-spacing:.5px;margin-bottom:6px;
  font-family:'Segoe UI',Arial,sans-serif;text-transform:uppercase;}
#vtLockBox p{color:#AAA8C2;font-size:12px;margin-bottom:20px;font-family:'Segoe UI',Arial,sans-serif;}
#vtLockInput{width:100%;background:#1B1B2F;border:1px solid #3A3A58;border-radius:8px;color:#fff;
  padding:12px 14px;font-size:14px;margin-bottom:12px;font-family:'Segoe UI',Arial,sans-serif;}
#vtLockInput:focus{outline:none;border-color:#E5751F;}
#vtLockBtn{width:100%;background:#E5751F;color:#3D0A1E;border:none;border-radius:8px;padding:12px;
  font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;
  font-family:'Segoe UI',Arial,sans-serif;transition:filter .15s;}
#vtLockBtn:hover{filter:brightness(1.1);}
#vtLockBtn:active{filter:brightness(.95);}
#vtLockErr{color:#ff8080;font-size:11px;margin-top:10px;min-height:14px;font-family:'Segoe UI',Arial,sans-serif;}
#vtLockFoot{color:#666485;font-size:10px;margin-top:18px;font-family:'Segoe UI',Arial,sans-serif;}
</style>
</head>

<script>
(function(){
  var PBKDF2_ITERATIONS = 300000;
  var SS_KEY = 'vt_scout_pw_v1';

  function b64ToBytes(str) {
    var bin = atob(str);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function deriveKey(password, saltBytes) {
    var enc = new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey'])
      .then(function(baseKey){
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: saltBytes, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      });
  }

  function decryptPayload(password) {
    var payload = JSON.parse(document.getElementById('vtLockPayload').textContent);
    var salt = b64ToBytes(payload.salt);
    var iv = b64ToBytes(payload.iv);
    var ct = b64ToBytes(payload.ct);
    return deriveKey(password, salt).then(function(key){
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    }).then(function(plainBuf){
      return new TextDecoder().decode(plainBuf);
    });
  }

  function reveal(html) {
    document.body.innerHTML = html;
    var scripts = Array.prototype.slice.call(document.body.querySelectorAll('script'));
    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');
      for (var i = 0; i < oldScript.attributes.length; i++) {
        var attr = oldScript.attributes[i];
        newScript.setAttribute(attr.name, attr.value);
      }
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function attemptUnlock(password, opts) {
    opts = opts || {};
    return decryptPayload(password).then(function(html){
      try { sessionStorage.setItem(SS_KEY, password); } catch(e) {}
      reveal(html);
      return true;
    }).catch(function(){
      if (!opts.silent) {
        var err = document.getElementById('vtLockErr');
        if (err) err.textContent = 'Incorrect password. Try again.';
        var input = document.getElementById('vtLockInput');
        if (input) { input.value = ''; input.focus(); }
      }
      return false;
    });
  }

  function wireUpUI() {
    var btn = document.getElementById('vtLockBtn');
    var input = document.getElementById('vtLockInput');
    if (btn) btn.addEventListener('click', function(){ attemptUnlock(input.value); });
    if (input) input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') attemptUnlock(input.value);
    });
  }

  var stored = null;
  try { stored = sessionStorage.getItem(SS_KEY); } catch(e) {}
  if (stored) {
    attemptUnlock(stored, { silent: true }).then(function(ok){
      if (!ok) wireUpUI();
    });
  } else {
    wireUpUI();
  }
})();
</script>

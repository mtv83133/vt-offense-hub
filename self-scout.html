<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VT 2026 | Offensive Self Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --maroon: #861F41; --maroon-dark: #3D0A1E; --orange: #E5751F;
  --navy: #1B1B2F; --card: #242438; --card2: #2D2D45; --card3: #33334E;
  --border: #3A3A58; --text: #FFFFFF; --dim: #AAA8C2; --muted: #666485;
  --great:#1E7A34; --above:#70AD47; --avg:#FFC000; --below:#ED7D31; --bad:#C00000;
  --great-bg:rgba(30,122,52,0.18); --above-bg:rgba(112,173,71,0.18);
  --avg-bg:rgba(255,192,0,0.18); --below-bg:rgba(237,125,49,0.18); --bad-bg:rgba(192,0,0,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);color:var(--text);font-size:13px;min-height:100vh;}
/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--maroon-dark) 0%,var(--maroon) 100%);border-bottom:3px solid var(--orange);padding:0;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,0.7);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.hdr-left{display:flex;align-items:center;gap:14px;}
.vt-logo{background:var(--orange);color:var(--maroon-dark);font-size:22px;font-weight:900;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;border:2px solid rgba(255,255,255,0.2);}
.hdr-title h1{font-size:16px;font-weight:800;letter-spacing:.5px;}
.hdr-title p{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.hdr-pills{display:flex;gap:8px;align-items:center;}
.hp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.75);}
.hp b{color:var(--orange);}
/* ── TABS ── */
.tab-bar{background:var(--maroon-dark);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;}
.tab-btn{padding:10px 28px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-1px;}
.tab-btn:hover{color:var(--dim);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--orange);}
.tab-content{display:none;padding:20px 24px;}
.tab-content.active{display:block;}
/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;border-top:3px solid var(--border);}
.kpi.c-orange{border-top-color:var(--orange);}
.kpi.c-great{border-top-color:var(--great);}
.kpi.c-above{border-top-color:var(--above);}
.kpi.c-avg{border-top-color:var(--avg);}
.kpi.c-below{border-top-color:var(--below);}
.kpi.c-bad{border-top-color:var(--bad);}
.kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.kpi-val{font-size:24px;font-weight:800;line-height:1;}
.kpi-sub{font-size:10px;color:var(--dim);margin-top:4px;}
.kpi-bar{height:3px;border-radius:2px;margin-top:8px;background:var(--border);overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;}
/* ── SECTION HEADERS ── */
.sec-hdr{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:18px 0 10px;}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* ── GRID LAYOUTS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g-chart{display:grid;grid-template-columns:200px 1fr 1fr;gap:14px;}
/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.chart-wrap{position:relative;width:100%;}
/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--card2);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:7px 10px;text-align:left;font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;}
.tbl th.r,.tbl td.r{text-align:right;}
.tbl th.c,.tbl td.c{text-align:center;}
.tbl td{padding:6px 10px;border-bottom:1px solid rgba(58,58,88,.5);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.035);}
/* family section header */
.tbl tr.fam-hdr td{background:var(--maroon);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#fff;padding:9px 10px;border-top:2px solid var(--border);}
.tbl tr.fam-hdr td:first-child{border-left:4px solid var(--orange);}
/* scheme main row — alternating */
.tbl tr.scheme-row-even td{background:rgba(247,230,234,0.06);}
.tbl tr.scheme-row-odd  td{background:transparent;}
.tbl tr.scheme-row-even td:first-child, .tbl tr.scheme-row-odd td:first-child{padding-left:18px;font-weight:600;}
/* RUN sub-row */
.tbl tr.sub-run td{background:rgba(253,235,208,0.08);font-style:italic;color:#F8C99A;}
.tbl tr.sub-run td:first-child{padding-left:36px;color:#F8C99A;}
/* PASS sub-row */
.tbl tr.sub-pass td{background:rgba(247,230,234,0.08);font-style:italic;color:#F0A0B5;}
.tbl tr.sub-pass td:first-child{padding-left:36px;color:#F0A0B5;}
/* family TOTAL row */
.tbl tr.fam-total td{background:rgba(229,117,31,.15);font-weight:800;border-top:1px solid rgba(229,117,31,.3);}
.tbl tr.fam-total td:first-child{padding-left:14px;color:var(--orange);}
/* family total RUN sub */
.tbl tr.ftot-run td{background:rgba(253,235,208,0.12);font-style:italic;color:#F8C99A;}
.tbl tr.ftot-run td:first-child{padding-left:28px;color:#F8C99A;}
/* family total PASS sub */
.tbl tr.ftot-pass td{background:rgba(247,230,234,0.12);font-style:italic;color:#F0A0B5;}
.tbl tr.ftot-pass td:first-child{padding-left:28px;color:#F0A0B5;}
/* spacer row */
.tbl tr.spacer td{background:var(--border);padding:2px;border:none;}
/* overall total */
.tbl tr.overall-total td{background:var(--orange);color:#fff;font-weight:800;font-size:13px;border-top:2px solid var(--orange);}
/* warp play header */
.tbl tr.warp-row td{background:rgba(134,31,65,.15);font-weight:800;border-top:2px solid var(--border);}
.tbl tr.warp-row td:first-child{border-left:3px solid var(--maroon);}
.tbl tr.warp-sub td{padding-left:22px;color:var(--dim);}
.tbl tr.warp-sub td:first-child{color:var(--dim);}
/* pass section banner */
.tbl tr.section-banner td{background:rgba(229,117,31,.1);border-left:3px solid var(--orange);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);padding:7px 10px;}
/* rz banner */
.tbl tr.rz-banner td{background:rgba(134,31,65,.1);border-left:3px solid var(--maroon);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#D4748E;padding:7px 10px;}
/* ── PILLS ── */
.pill{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;line-height:1.6;white-space:nowrap;}
.pg{background:var(--great);color:#fff;}
.pag{background:var(--above);color:#fff;}
.pav{background:var(--avg);color:#000;}
.pbl{background:var(--below);color:#fff;}
.pbd{background:var(--bad);color:#fff;}
/* mini eff bar */
.ebar-wrap{white-space:nowrap;}
.ebar{display:inline-block;width:40px;height:5px;background:var(--border);border-radius:3px;vertical-align:middle;overflow:hidden;margin-right:5px;}
.ebar-fill{display:block;height:100%;border-radius:3px;}
/* ── POSITION CARDS ── */
.pos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:4px;}
.pos-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;}
.pos-badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;margin:0 auto 8px;border:2px solid;}
.lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.big{font-size:22px;font-weight:800;line-height:1;}
.pos-stat{font-size:10px;color:var(--dim);margin-top:5px;line-height:1.7;}
.pos-pbar{margin-top:8px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
/* ── OVERVIEW SPLIT ROW ── */
.overview-grid{display:grid;grid-template-columns:180px 1fr 1fr;gap:14px;}
/* ── SCROLLABLE TABLE WRAPPER ── */
.tbl-scroll{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
.tbl-scroll .tbl{border:none;}
/* ── SUMMARY TILES (run/pass sub-overview) ── */
.mini-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.mini-kpi{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.mini-kpi .lbl{margin-bottom:3px;}
.mini-kpi .val{font-size:20px;font-weight:800;}
.mini-kpi .sub{font-size:10px;color:var(--dim);margin-top:2px;}
.sub-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:9px 24px;background:rgba(61,10,30,0.6);border-bottom:1px solid var(--border);}
.sub-bar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-right:4px;}
.sub-pill{padding:3px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;border:1px solid rgba(255,255,255,.2);border-radius:14px;color:rgba(255,255,255,.55);background:transparent;transition:all .15s;}
.sub-pill:hover{color:rgba(255,255,255,.9);border-color:var(--orange);}
.sub-pill.active{background:var(--orange);border-color:var(--orange);color:#fff;}
/* ── NO DATA STATE ── */
.no-data-state{text-align:center;padding:70px 24px;}
.no-data-state h2{font-size:16px;font-weight:800;color:var(--muted);margin-bottom:8px;}
.no-data-state p{font-size:12px;color:var(--dim);line-height:1.8;max-width:480px;margin:0 auto;}
.no-data-code{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 18px;display:inline-block;margin-top:14px;font-family:monospace;font-size:12px;color:var(--orange);text-align:left;}
.no-data-code div{margin-bottom:4px;}
/* ── PERIOD CONTENT AREA ── */
.period-content{padding:20px 24px;}
.period-kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:18px;}
/* ── PERIOD SELECTOR BAR ── */
.period-bar{display:flex;align-items:center;gap:2px;padding:0 24px;background:var(--maroon-dark);border-bottom:2px solid var(--border);}

/* ── SIDEBAR (shared nav pattern) ── */
#sb{width:220px;min-width:220px;background:linear-gradient(180deg,var(--maroon-dark) 0%,var(--maroon) 100%);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:250;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.1);}
.sb-logo{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
.sb-logo-badge{background:var(--orange);color:var(--maroon-dark);font-size:15px;font-weight:900;width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.2);}
.sb-team{color:#fff;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.sb-sub{color:rgba(255,255,255,.5);font-size:10px;margin-top:1px;}
.sb-hublink{text-decoration:none;display:block;}
.sb-sec{padding:12px 14px 3px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);}
.sbnav{display:block;padding:8px 14px;color:rgba(255,255,255,.75);text-decoration:none;font-size:12px;font-weight:600;cursor:pointer;border-left:3px solid transparent;transition:all .1s;}
.sbnav:hover{background:rgba(255,255,255,.07);color:#fff;}
.sbnav.on{background:rgba(229,117,31,.2);color:var(--orange);border-left-color:var(--orange);font-weight:700;}
.sbnav .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);margin-right:6px;}
.sbnav.has-data .dot{background:var(--above);}
.year-sel{margin:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:6px 8px;width:calc(100% - 28px);}
.year-sel option{color:#1a1a1a;}
#main-wrap{margin-left:220px;min-height:100vh;}

.period-btn{padding:9px 22px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;color:rgba(255,255,255,.45);border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-2px;}
.period-btn:hover{color:rgba(255,255,255,.8);}
.period-btn.active{color:#fff;border-bottom-color:var(--orange);}
.period-btn.pb-fall{}.period-btn.pb-season{}.period-btn.pb-combined{}
.period-btn.pb-combined.active{border-bottom-color:#C55FA0;}
/* ── SUBFILTER BAR (day / game / combined checkboxes) ── */
.sub-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px 24px;background:rgba(27,27,47,0.8);border-bottom:1px solid var(--border);}
.sub-bar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-right:2px;}
.sub-pill{padding:3px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;border:1px solid rgba(255,255,255,.2);border-radius:14px;color:rgba(255,255,255,.55);background:transparent;transition:all .15s;}
.sub-pill:hover{color:rgba(255,255,255,.9);border-color:var(--orange);}
.sub-pill.active{background:var(--orange);border-color:var(--orange);color:#fff;}
.sub-pill.comb-active{background:#C55FA0;border-color:#C55FA0;color:#fff;}
/* ── PERIOD CONTENT PANE ── */
#period-pane{display:none;}
#period-pane .tab-content.active{display:block;}
.period-tab-inner{padding:20px 24px;}
.period-kpi-row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:18px;}
/* ── NO DATA STATE ── */
.no-data-state{text-align:center;padding:70px 24px;}
.no-data-state h2{font-size:16px;font-weight:800;color:var(--muted);margin-bottom:8px;}
.no-data-state p{font-size:12px;color:var(--dim);line-height:1.8;max-width:480px;margin:0 auto;}
.no-data-code{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 18px;display:inline-block;margin-top:14px;font-family:monospace;font-size:12px;color:var(--orange);text-align:left;}
.no-data-code div{margin-bottom:4px;}
/* ── ANALYSIS TAB ── */
.asub-nav{display:flex;gap:0;background:var(--maroon-dark);border-bottom:2px solid var(--border);padding:0 24px;}
.asub-btn{padding:9px 22px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;color:rgba(255,255,255,.45);border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-2px;}
.asub-btn:hover{color:rgba(255,255,255,.8);}
.asub-btn.active{color:#fff;border-bottom-color:var(--maroon);}
.asec{display:none;padding:20px 24px;}
.asec.aactive{display:block;}
.alert-card{display:flex;gap:10px;align-items:flex-start;background:var(--card2);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.alert-card.alert-warn{border-left-color:var(--avg);}
.alert-card.alert-good{border-left-color:var(--great);}
.alert-card.alert-info{border-left-color:#4488DD;}
.alert-card.alert-bad{border-left-color:var(--bad);}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:2px;}
.alert-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
.alert-msg{font-size:12px;color:var(--text);line-height:1.5;}
.quadrant-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.quadrant{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.quadrant.q-bread{border-top:3px solid var(--great);} .quadrant.q-under{border-top:3px solid var(--above);}
.quadrant.q-over{border-top:3px solid var(--bad);} .quadrant.q-avoid{border-top:3px solid var(--muted);}
.quad-ttl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;}
.quad-ttl.q-bread{color:var(--great);} .quad-ttl.q-under{color:var(--above);}
.quad-ttl.q-over{color:var(--bad);} .quad-ttl.q-avoid{color:var(--muted);}
.quad-desc{font-size:10px;color:var(--muted);margin-bottom:8px;}
.quad-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(58,58,88,.4);font-size:11px;}
.quad-item:last-child{border-bottom:none;}
.quad-stats{font-size:10px;color:var(--dim);white-space:nowrap;}
.tend-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tend-lbl{font-size:10px;font-weight:700;color:var(--dim);flex-shrink:0;width:88px;}
.tend-bar-wrap{flex:1;height:20px;background:var(--card3);border-radius:4px;overflow:hidden;display:flex;min-width:0;}
.tend-run-fill{background:#FFC000;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#000;white-space:nowrap;}
.tend-pass-fill{background:#70AD47;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;white-space:nowrap;}
.tend-n{font-size:10px;color:var(--muted);flex-shrink:0;width:56px;text-align:right;}
.combo-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.combo-jersey{font-size:26px;font-weight:900;color:var(--orange);line-height:1;}
.combo-name{font-size:11px;color:var(--dim);margin-top:3px;}
.combo-pos{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(134,31,65,.3);color:#D4748E;border-radius:3px;padding:2px 6px;margin-top:3px;}
.combo-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px;}
.combo-stat .v{font-size:14px;font-weight:800;}
.combo-stat .l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.ol-lineup{display:flex;gap:4px;margin-bottom:6px;}
.ol-pos{background:var(--card3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center;flex:1;}
.ol-pos-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.ol-pos-num{font-size:13px;font-weight:800;color:var(--orange);margin:2px 0;}
.ol-pos-name{font-size:8px;color:var(--dim);}
.target-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.target-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.target-jersey{font-size:22px;font-weight:900;color:var(--orange);}
.target-name{font-size:10px;color:var(--dim);margin-top:2px;}
.target-pos{font-size:9px;color:var(--muted);}
.target-stat{font-size:10px;color:var(--dim);margin-top:4px;}
.target-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.target-bar-fill{height:100%;background:var(--orange);border-radius:2px;}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--card);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--orange);}
.upload-icon{font-size:32px;opacity:.5;margin-bottom:8px;}
.upload-ttl{font-size:14px;font-weight:700;color:var(--dim);}
.upload-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.group-bar-wrap{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid rgba(58,58,88,.4);}
.group-bar-lbl{font-size:11px;font-weight:700;flex-shrink:0;width:56px;color:var(--dim);}
.group-bar-track{flex:1;height:16px;background:var(--card3);border-radius:4px;overflow:hidden;}
.group-bar-fill{height:100%;border-radius:4px;}
.group-bar-stat{font-size:10px;color:var(--muted);flex-shrink:0;width:120px;text-align:right;}
/* ── LINEUP COMBOS ──────────────────────────────────────────────── */
.lineup-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.lineup-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card3);border-bottom:1px solid var(--border);}
.lineup-rank{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.lineup-pers{font-size:9px;font-weight:700;background:rgba(229,117,31,.18);color:var(--orange);border-radius:4px;padding:2px 7px;}
.lineup-n{font-size:12px;font-weight:800;color:var(--text);}
.lineup-players{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);}
.lp-chip{display:flex;flex-direction:column;align-items:center;background:var(--card3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;min-width:52px;}
.lp-chip.qb{border-top:2px solid var(--maroon);}
.lp-chip.rb{border-top:2px solid var(--orange);}
.lp-chip.te{border-top:2px solid #4488DD;}
.lp-chip.wr{border-top:2px solid #70AD47;}
.lp-chip.ol{border-top:2px solid #888;}
.lp-pos{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.lp-num{font-size:13px;font-weight:900;color:var(--text);line-height:1.1;}
.lp-name{font-size:8px;color:var(--dim);max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lineup-stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
.ls-cell{flex:1;padding:8px 6px;text-align:center;border-right:1px solid var(--border);}
.ls-cell:last-child{border-right:none;}
.ls-v{font-size:13px;font-weight:800;}
.ls-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}
.lineup-plays{padding:8px 14px;}
.lp-play-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(58,58,88,.3);font-size:10px;}
.lp-play-row:last-child{border-bottom:none;}
.lp-play-call{flex:1;color:var(--dim);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-play-badge{font-size:8px;font-weight:700;border-radius:3px;padding:1px 5px;flex-shrink:0;}
.lp-play-badge.run{background:rgba(255,192,0,.15);color:#FFC000;}
.lp-play-badge.pass{background:rgba(112,173,71,.15);color:#70AD47;}
.lineup-ol-table{width:100%;border-collapse:collapse;}
.lineup-ol-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:6px 10px;background:var(--card3);border-bottom:1px solid var(--border);text-align:left;}
.lineup-ol-table td{font-size:10px;padding:5px 10px;border-bottom:1px solid rgba(58,58,88,.25);}
.csv-drop-zone{border:2px dashed var(--border);border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--card);}
.csv-drop-zone:hover,.csv-drop-zone.drag-over{border-color:var(--orange);background:rgba(229,117,31,.04);}
.csv-drop-icon{font-size:36px;margin-bottom:8px;opacity:.6;}
.csv-drop-ttl{font-size:14px;font-weight:700;color:var(--dim);}
.csv-drop-sub{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6;}
.csv-status-bar{display:flex;align-items:center;gap:10px;background:var(--card3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:11px;}
</style>

<script>
(function(){
  var PBKDF2_ITERATIONS = 300000;
  var SS_KEY = 'vt_scout_pw_v1';

  function b64ToBytes(str) {
    var bin = atob(str);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function deriveKey(password, saltBytes) {
    var enc = new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey'])
      .then(function(baseKey){
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: saltBytes, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      });
  }

  function decryptPayload(password) {
    var payload = JSON.parse(document.getElementById('vtLockPayload').textContent);
    var salt = b64ToBytes(payload.salt);
    var iv = b64ToBytes(payload.iv);
    var ct = b64ToBytes(payload.ct);
    return deriveKey(password, salt).then(function(key){
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    }).then(function(plainBuf){
      return new TextDecoder().decode(plainBuf);
    });
  }

  function reveal(html) {
    document.body.innerHTML = html;
    var scripts = Array.prototype.slice.call(document.body.querySelectorAll('script'));
    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');
      for (var i = 0; i < oldScript.attributes.length; i++) {
        var attr = oldScript.attributes[i];
        newScript.setAttribute(attr.name, attr.value);
      }
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function attemptUnlock(password, opts) {
    opts = opts || {};
    return decryptPayload(password).then(function(html){
      try { sessionStorage.setItem(SS_KEY, password); } catch(e) {}
      reveal(html);
      return true;
    }).catch(function(){
      if (!opts.silent) {
        var err = document.getElementById('vtLockErr');
        if (err) err.textContent = 'Incorrect password. Try again.';
        var input = document.getElementById('vtLockInput');
        if (input) { input.value = ''; input.focus(); }
      }
      return false;
    });
  }

  function wireUpUI() {
    var btn = document.getElementById('vtLockBtn');
    var input = document.getElementById('vtLockInput');
    if (btn) btn.addEventListener('click', function(){ attemptUnlock(input.value); });
    if (input) input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') attemptUnlock(input.value);
    });
  }

  var stored = null;
  try { stored = sessionStorage.getItem(SS_KEY); } catch(e) {}
  if (stored) {
    attemptUnlock(stored, { silent: true }).then(function(ok){
      if (!ok) wireUpUI();
    });
  } else {
    wireUpUI();
  }
})();
</script>
